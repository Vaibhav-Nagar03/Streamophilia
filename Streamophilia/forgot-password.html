<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>STREAMOPHILIA | Reset Password</title>
    <script src="theme.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface": "var(--color-surface)",
                        "surface-container": "var(--color-surface-container)",
                        "surface-container-high": "var(--color-surface-container-high)",
                        "surface-container-highest": "var(--color-surface-container-highest)",
                        "on-surface": "var(--color-on-surface)",
                        "on-surface-variant": "var(--color-on-surface-variant)",
                        "outline-variant": "var(--color-outline-variant)",
                        "primary": "var(--color-primary)",
                        "primary-dim": "var(--color-primary-dim)",
                        "on-primary": "var(--color-on-primary)",
                        "secondary": "var(--color-secondary)",
                        "error": "var(--color-error)",
                        "on-error": "var(--color-on-error)",
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Manrope"],
                        "label": ["Manrope"],
                    },
                },
            },
        };
    </script>
    <style>
        body { background: var(--color-surface); }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 font-body text-on-surface">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <div class="flex items-center justify-center gap-2 mb-2">
                <div class="w-9 h-9 rounded-lg bg-primary flex items-center justify-center">
                    <span class="material-symbols-outlined text-on-primary">play_arrow</span>
                </div>
                <h1 class="font-headline font-bold text-2xl tracking-tight text-primary">STREAMOPHILIA</h1>
            </div>
            <p class="text-sm text-on-surface-variant">Reset your account password</p>
        </div>

        <div class="bg-surface-container-high border border-outline-variant/20 rounded-2xl p-8">

            <!-- Honesty note: no real email infrastructure exists yet -->
            <div class="bg-secondary/10 border border-secondary/30 rounded-lg p-3 mb-6 flex gap-2">
                <span class="material-symbols-outlined text-secondary text-lg flex-shrink-0">info</span>
                <p class="text-xs text-on-surface-variant leading-relaxed">
                    This project doesn't send real reset emails yet, so this form lets you set a new password directly for a known account email. On a real deployment this would require verifying you own the email first.
                </p>
            </div>

            <form id="reset-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Account Email</label>
                    <input type="email" id="reset-email" required placeholder="you@example.com"
                        class="w-full bg-surface-container-highest border border-outline-variant/20 rounded-lg px-4 py-3 text-sm focus:border-primary focus:ring-1 focus:ring-primary text-on-surface transition-colors" />
                </div>
                <div>
                    <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">New Password</label>
                    <input type="password" id="reset-password" required minlength="6" placeholder="At least 6 characters"
                        class="w-full bg-surface-container-highest border border-outline-variant/20 rounded-lg px-4 py-3 text-sm focus:border-primary focus:ring-1 focus:ring-primary text-on-surface transition-colors" />
                </div>

                <p id="reset-error" class="text-error text-xs hidden"></p>
                <p id="reset-success" class="text-secondary text-xs hidden"></p>

                <button type="submit" id="reset-submit"
                    class="w-full py-3 rounded-lg bg-gradient-to-r from-primary to-primary-dim text-on-primary font-bold text-sm hover:opacity-90 transition-opacity">
                    Reset Password
                </button>
            </form>

            <p class="text-center text-xs text-on-surface-variant mt-6">
                <a href="login.html" class="text-primary hover:text-secondary transition-colors font-bold">Back to Sign In</a>
            </p>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        const form = document.getElementById('reset-form');
        const errorEl = document.getElementById('reset-error');
        const successEl = document.getElementById('reset-success');
        const submitBtn = document.getElementById('reset-submit');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorEl.classList.add('hidden');
            successEl.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Resetting…';

            try {
                const response = await fetch(API_URL + '/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('reset-email').value,
                        newPassword: document.getElementById('reset-password').value
                    })
                });
                const data = await response.json();

                if (!response.ok) {
                    errorEl.textContent = data.error || 'Could not reset password.';
                    errorEl.classList.remove('hidden');
                    return;
                }

                successEl.textContent = data.message + ' Redirecting to sign in…';
                successEl.classList.remove('hidden');
                setTimeout(() => { window.location.href = 'login.html'; }, 1800);
            } catch (err) {
                errorEl.textContent = 'Something went wrong. Please try again.';
                errorEl.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Reset Password';
            }
        });
    </script>
</body>

</html>
